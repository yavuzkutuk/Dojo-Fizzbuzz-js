<script>

/*
    https://gist.github.com/jaysonrowe/1592432
*/
  function fizzbuzz(number){
    if (number % 3 === 0 && number % 5 === 0) {
      return "fizzbuzz";
    }
    if (number % 3 === 0) {
      return "fizz";
    }
    if (number % 5 === 0) {
      return "buzz";
    }
    return number;
  }

  document.write(fizzbuzz(11));

</script>
